# ============================================================
# Netlify Configuration — Mozaiik Live
# ============================================================

# ---------- Build & Pretty URLs ----------
[build]
  publish = "."

[build.processing.html]
  pretty_urls = true

# ==========================================================
# Security Headers (all pages)
# ==========================================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ==========================================================
# Cache Headers — Images
# ==========================================================
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ==========================================================
# Cache Headers — Fonts (woff2)
# ==========================================================
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ==========================================================
# Cache Headers — CSS
# ==========================================================
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ==========================================================
# Cache Headers — JavaScript
# ==========================================================
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ==========================================================
# Redirects — .html to clean URLs (301 permanent)
# ==========================================================
[[redirects]]
  from = "/about.html"
  to = "/about"
  status = 301
  force = true

